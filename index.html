<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SSL // ADMIN PANEL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: url('https://i.ibb.co/WNRqtkN3/image-9.png') 0 0, auto;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', 'Fira Code', 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: crtFlicker 0.08s infinite;
        }

        @keyframes crtFlicker {
            0% { opacity: 0.97; }
            100% { opacity: 1; }
        }

        .crt-convex {
            position: relative;
            width: 100%;
            height: 100%;
            background: #030a03;
            border-radius: 60px / 40px;
            overflow: hidden;
            box-shadow: 
                inset 0 0 80px rgba(0, 20, 0, 0.9),
                0 0 0 6px #1a3a1a,
                0 0 0 12px #0a1f0a;
            transform: perspective(1200px) rotateX(2deg) rotateY(0.5deg);
            transition: transform 0.1s ease;
        }

        .crt-convex::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0, 255, 0, 0.05) 0%, rgba(0, 0, 0, 0.4) 80%);
            pointer-events: none;
            z-index: 3;
            border-radius: inherit;
        }

        .crt-convex::after {
            content: "";
            position: absolute;
            top: 5%;
            left: 10%;
            width: 80%;
            height: 30%;
            background: radial-gradient(ellipse, rgba(100, 255, 100, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 4;
            border-radius: 50%;
            filter: blur(8px);
        }

        .terminal {
            width: 100%;
            height: 100%;
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            color: #3eff7e;
            position: relative;
            z-index: 2;
            overflow-y: auto;
            background: #020a02;
            background-image: radial-gradient(rgba(0, 40, 0, 0.3) 1px, transparent 1px);
            background-size: 4px 4px;
            text-shadow: 0 0 3px #00aa33;
            border-radius: inherit;
        }

        .boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #010a01;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            color: #2eff7a;
            transition: opacity 0.3s ease;
        }

        .boot-screen.hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .boot-version {
            font-size: 2rem;
            letter-spacing: 4px;
            white-space: nowrap;
            overflow-x: hidden;
            max-width: 98vw;
            padding: 0 1rem;
        }

        .boot-spinner {
            font-size: 2.5rem;
            margin-top: 1rem;
        }

        .version-scroll {
            overflow-x: hidden;
            white-space: nowrap;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid #2e8b57;
            padding-bottom: 0.3rem;
        }

        .system-version {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            display: inline-block;
            font-family: monospace;
        }

        .dos-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .dos-screen.active {
            display: flex;
        }

        .command-history {
            flex: 1;
            background: #020802aa;
            border-radius: 12px;
            padding: 0.8rem;
            margin: 0.8rem 0;
            overflow-y: auto;
            font-size: 0.9rem;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .history-line {
            margin: 0.1rem 0;
            line-height: 1.3;
        }

        .command-line {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #041104cc;
            padding: 0.5rem 0.8rem;
            border-radius: 16px;
            margin-top: 0.2rem;
        }

        .prompt {
            font-size: 1rem;
            font-weight: bold;
            color: #b0ffb0;
        }

        #cmdInput {
            background: transparent;
            border: none;
            color: #3eff7e;
            font-family: monospace;
            font-size: 0.95rem;
            flex: 1;
            outline: none;
            caret-color: #5eff8f;
        }

        .effect-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }

        #noiseCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.25;
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 10001;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 30, 0, 0.5) 0px, rgba(0, 255, 0, 0.08) 2px, transparent 3px, transparent 7px);
            pointer-events: none;
            z-index: 10002;
            animation: scanMove 0.15s linear infinite;
        }

        @keyframes scanMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 8px; }
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0a2a0a;
            border-left: 4px solid #3eff7e;
            padding: 10px 15px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #3eff7e;
            z-index: 20000;
            max-width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: fadeOut 5s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(0); }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; transform: translateX(20px); }
        }
    </style>
</head>
<body>

    <canvas id="noiseCanvas" class="effect-layer"></canvas>
    <div class="scanlines"></div>

    <div id="bootScreen" class="boot-screen">
        <div class="boot-version">SSL v.INF</div>
        <div class="boot-spinner" id="bootSpinner">/</div>
        <div style="margin-top: 2rem;">[ ACTIVATING SECURE LAYER ]</div>
    </div>

    <div class="crt-convex" id="crtConvex">
        <div class="terminal">
            <div class="version-scroll">
                <div class="system-version">SSL // ACTIVE</div>
            </div>

            <div id="dosScreen" class="dos-screen">
                <div class="command-history" id="historyContainer"></div>
                <div class="command-line">
                    <span class="prompt" id="currentPrompt">A&gt;</span>
                    <input type="text" id="cmdInput" autofocus spellcheck="false" autocomplete="off">
                </div>
            </div>
        </div>
    </div>

    <script>
        const channel = new BroadcastChannel('ssl_admin_channel');
        const clientId = 'id_' + Math.random().toString(36).substring(2, 10) + '_' + Date.now();
        let adminMode = false;
        let onlineUsers = new Set();

        const files = {
            "001": {
                name: "INFO.txt",
                content: "=== SYSTEM INFORMATION ===\nSSL // ROBCO INDUSTRIES (TM)\nMILITECH MK31 DEFENDER\nACTIVE SINCE 2049-08-04\nINFINITE CORE ONLINE",
                protected: false,
                password: null
            },
            "002": {
                name: "STASON.dat",
                content: "=== STASON DATA ===\n[CONFIDENTIAL]\nACCESS GRANTED\nSECURITY LEVEL: ALPHA\nSYSTEM OVERRIDE CODE: X7-990-0A1",
                protected: true,
                password: "3350"
            },
            "003": {
                name: "sslDM.EXE",
                content: "ADMIN TOOL",
                protected: false,
                password: null,
                isAdminTool: true
            }
        };

        function getCurrentDate() {
            const now = new Date();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            const year = now.getFullYear().toString().slice(-2);
            return `${month}-${day}-${year}`;
        }

        function getCurrentTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        function showNotification(message, color = '#3eff7e') {
            const div = document.createElement('div');
            div.className = 'notification';
            div.style.borderLeftColor = color;
            div.style.color = color;
            div.innerText = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        function announceNewUser() {
            onlineUsers.add(clientId);
            channel.postMessage({ type: 'new_client', id: clientId });
        }

        function announceRemoveUser() {
            onlineUsers.delete(clientId);
            channel.postMessage({ type: 'remove_client', id: clientId });
        }

        function requestFullUserList() {
            channel.postMessage({ type: 'request_full_list', from: clientId });
        }

        channel.onmessage = (e) => {
            const data = e.data;
            if (!data) return;

            if (data.type === 'new_client') {
                onlineUsers.add(data.id);
                if (adminMode) addHistoryLine(`[ADMIN] New user connected: ${data.id}`, false);
            }
            else if (data.type === 'remove_client') {
                onlineUsers.delete(data.id);
                if (adminMode) addHistoryLine(`[ADMIN] User disconnected: ${data.id}`, false);
            }
            else if (data.type === 'request_full_list') {
                channel.postMessage({ type: 'client_present', id: clientId, target: data.from });
            }
            else if (data.type === 'client_present') {
                if (adminMode && data.target === clientId) {
                    onlineUsers.add(data.id);
                }
            }
            else if (data.type === 'broadcast') {
                if (data.from !== clientId) {
                    showNotification(`📢 MESSAGE FROM ADMIN: ${data.message}`, data.color || '#3eff7e');
                    addHistoryLine(`[SERVER] Admin broadcast: ${data.message}`, false);
                }
            }
            else if (data.type === 'direct') {
                if (data.targetId === clientId) {
                    showNotification(`✉️ PRIVATE from ${data.from}: ${data.message}`, data.color || '#3eff7e');
                    addHistoryLine(`[PRIVATE] ${data.from}: ${data.message}`, false);
                }
            }
            else if (data.type === 'kick') {
                if (data.targetId === clientId) {
                    showNotification('⚠️ You have been kicked by administrator!', '#ff5555');
                    addHistoryLine('[SYSTEM] You were kicked. Reloading...', false);
                    setTimeout(() => {
                        document.body.innerHTML = '<div style="color:#3eff7e; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; font-family:monospace; flex-direction:column;">SESSION TERMINATED<br><span style="font-size:0.8rem;">Reload page to reconnect.</span></div>';
                    }, 500);
                }
            }
        };

        const bootScreen = document.getElementById('bootScreen');
        const dosScreen = document.getElementById('dosScreen');
        const bootSpinner = document.getElementById('bootSpinner');
        let spinIdx = 0;
        const spinnerChars = ["l", "/", "-", "\\"];
        const spinnerInterval = setInterval(() => {
            spinIdx = (spinIdx + 1) % spinnerChars.length;
            if (bootSpinner) bootSpinner.innerText = spinnerChars[spinIdx];
        }, 150);

        setTimeout(() => {
            clearInterval(spinnerInterval);
            bootScreen.classList.add('hidden');
            dosScreen.classList.add('active');
            initHistory();
            document.getElementById('cmdInput').focus();
            announceNewUser();
        }, 4000);

        const noiseCanvas = document.getElementById('noiseCanvas');
        let noiseCtx = noiseCanvas.getContext('2d');
        let noiseActive = true;
        function resizeNoise() {
            noiseCanvas.width = window.innerWidth;
            noiseCanvas.height = window.innerHeight;
        }
        function generateNoise() {
            if (!noiseActive) {
                if (noiseCtx) noiseCtx.clearRect(0, 0, noiseCanvas.width, noiseCanvas.height);
                requestAnimationFrame(generateNoise);
                return;
            }
            const w = noiseCanvas.width, h = noiseCanvas.height;
            const imgData = noiseCtx.createImageData(w, h);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const val = Math.random() * 80 + 30;
                imgData.data[i] = val - 20;
                imgData.data[i+1] = val + 40;
                imgData.data[i+2] = val - 30;
                imgData.data[i+3] = 90 + Math.random() * 70;
            }
            noiseCtx.putImageData(imgData, 0, 0);
            requestAnimationFrame(generateNoise);
        }
        window.addEventListener('resize', () => resizeNoise());
        resizeNoise();
        generateNoise();

        const historyContainer = document.getElementById('historyContainer');
        const cmdInput = document.getElementById('cmdInput');
        const promptSpan = document.getElementById('currentPrompt');
        let currentPath = 'A';
        let pendingFileId = null;

        function addHistoryLine(text, isCommand = false) {
            const line = document.createElement('div');
            line.className = 'history-line';
            line.style.color = isCommand ? '#b0ffb0' : '#9eff9e';
            line.innerText = text;
            historyContainer.appendChild(line);
            historyContainer.scrollTop = historyContainer.scrollHeight;
        }

        function initHistory() {
            addHistoryLine('╔══════════════════════════════════════════════════════════╗');
            addHistoryLine('║                         SSL                              ║');
            addHistoryLine('║         ROBCO INDUSTRIES (TM) TERMINAL v.INF             ║');
            addHistoryLine('║            (C) 2049 MILITECH / ROBCO CORP.               ║');
            addHistoryLine('╚══════════════════════════════════════════════════════════╝');
            addHistoryLine('');
            addHistoryLine(`Enter today's date (m-d-y): ${getCurrentDate()}`);
            addHistoryLine('');
            addHistoryLine('Available commands: DIR, DATE, TIME, HELP, CLS, VER');
            addHistoryLine('  DIR <ID>  - open file (ID: 001, 002, 003)');
            addHistoryLine('  sslDM.EXE - access admin panel');
            addHistoryLine('');
        }

        function promptAdminPassword() {
            addHistoryLine('Enter admin password:');
            pendingFileId = 'admin_auth';
            cmdInput.dataset.mode = "admin_password";
            cmdInput.value = "";
            cmdInput.focus();
        }

        function displayFileContent(id) {
            const file = files[id];
            if (!file) {
                addHistoryLine(`File ID ${id} not found.`);
                return;
            }
            if (file.isAdminTool) {
                promptAdminPassword();
                return;
            }
            if (file.protected) {
                addHistoryLine(`File "${file.name}" is password protected. Enter password:`);
                pendingFileId = id;
                cmdInput.dataset.mode = "password";
                cmdInput.value = "";
                cmdInput.focus();
            } else {
                addHistoryLine(`=== ${file.name} (ID: ${id}) ===`);
                file.content.split('\n').forEach(line => addHistoryLine(line));
                addHistoryLine('');
            }
        }

        function checkPassword(inputPass) {
            if (!pendingFileId) return;
            const file = files[pendingFileId];
            if (inputPass === file.password) {
                addHistoryLine(`Access granted. Opening ${file.name}:`);
                addHistoryLine(`=== ${file.name} (ID: ${pendingFileId}) ===`);
                file.content.split('\n').forEach(line => addHistoryLine(line));
                addHistoryLine('');
            } else {
                addHistoryLine(`Access denied. Incorrect password for ${file.name}.`);
            }
            pendingFileId = null;
            cmdInput.dataset.mode = "normal";
        }

        function adminHelp() {
            addHistoryLine('Admin commands:');
            addHistoryLine('  send_all <color> <message>   - send to all (colors: red,green,blue,yellow,magenta,cyan)');
            addHistoryLine('  send_user <ID> <message>     - send private message');
            addHistoryLine('  list                         - show online users');
            addHistoryLine('  kick <ID>                    - kick user by ID');
            addHistoryLine('  exit                         - exit admin mode');
        }

        function processAdminCommand(cmd) {
            const parts = cmd.trim().split(/\s+/);
            const command = parts[0].toLowerCase();

            if (command === 'exit') {
                adminMode = false;
                promptSpan.innerText = `${currentPath}>`;
                addHistoryLine('Exited admin mode.', false);
                return;
            }
            else if (command === 'help') {
                adminHelp();
            }
            else if (command === 'list') {
                if (onlineUsers.size === 0) addHistoryLine('No users online.', false);
                else addHistoryLine(`Online users (${onlineUsers.size}): ${Array.from(onlineUsers).join(', ')}`, false);
            }
            else if (command === 'send_all') {
                if (parts.length < 3) {
                    addHistoryLine('Usage: send_all <color> <message>', false);
                    return;
                }
                const colorMap = { red: '#ff5555', green: '#55ff55', blue: '#5555ff', yellow: '#ffff55', magenta: '#ff55ff', cyan: '#55ffff' };
                let color = parts[1].toLowerCase();
                if (!colorMap[color]) {
                    addHistoryLine('Invalid color. Available: red, green, blue, yellow, magenta, cyan', false);
                    return;
                }
                const message = parts.slice(2).join(' ');
                channel.postMessage({ type: 'broadcast', message, color: colorMap[color], from: clientId });
                addHistoryLine(`[ADMIN] Broadcast sent to all (${color}): ${message}`, false);
            }
            else if (command === 'send_user') {
                if (parts.length < 3) {
                    addHistoryLine('Usage: send_user <ID> <message>', false);
                    return;
                }
                const targetId = parts[1];
                const message = parts.slice(2).join(' ');
                channel.postMessage({ type: 'direct', targetId, message, color: '#ffaa55', from: clientId });
                addHistoryLine(`[ADMIN] Private message sent to ${targetId}: ${message}`, false);
            }
            else if (command === 'kick') {
                if (parts.length < 2) {
                    addHistoryLine('Usage: kick <ID>', false);
                    return;
                }
                const targetId = parts[1];
                if (targetId === clientId) {
                    addHistoryLine('[ADMIN] You cannot kick yourself.', false);
                    return;
                }
                channel.postMessage({ type: 'kick', targetId, from: clientId });
                addHistoryLine(`[ADMIN] Kicked user ${targetId}`, false);
                onlineUsers.delete(targetId);
            }
            else {
                addHistoryLine(`Unknown admin command: ${command}. Type 'help' for list.`, false);
            }
        }

        function processCommand(cmd) {
            const trimmed = cmd.trim();
            if (trimmed === '') return;

            if (adminMode) {
                addHistoryLine(`ADMIN>${trimmed}`, true);
                processAdminCommand(trimmed);
                return;
            }

            addHistoryLine(`${currentPath}>${trimmed}`, true);
            const parts = trimmed.split(/\s+/);
            const command = parts[0].toLowerCase();

            if (command === 'dir') {
                if (parts.length === 1) {
                    addHistoryLine(' Volume in drive A is SSL_VOL');
                    addHistoryLine(' Volume Serial Number is 2E47-1901');
                    addHistoryLine('');
                    addHistoryLine('ID    Name           Size');
                    addHistoryLine('---   ----           ----');
                    for (const [id, file] of Object.entries(files)) {
                        const size = (file.content.length + 32).toString().padStart(6, ' ');
                        addHistoryLine(`${id}    ${file.name.padEnd(12)} ${size} bytes`);
                    }
                    addHistoryLine(`       ${Object.keys(files).length} File(s)         5120 bytes free`);
                } else {
                    const fileId = parts[1];
                    if (/^\d{3}$/.test(fileId)) displayFileContent(fileId);
                    else addHistoryLine(`Invalid file ID. Use three-digit number (e.g., 001).`);
                }
            }
            else if (command === 'date') {
                addHistoryLine(`Current date is ${getCurrentDate()}`);
                addHistoryLine('Enter new date (m-d-y):');
            }
            else if (command === 'time') {
                addHistoryLine(`Current time is ${getCurrentTime()}`);
                addHistoryLine('Enter new time:');
            }
            else if (command === 'help') {
                addHistoryLine('Available commands:');
                addHistoryLine('  DIR           - list files');
                addHistoryLine('  DIR <ID>      - open file (ID: 001, 002, 003)');
                addHistoryLine('  DATE          - show current system date');
                addHistoryLine('  TIME          - show current system time');
                addHistoryLine('  CLS           - clear screen');
                addHistoryLine('  VER           - display terminal version');
                addHistoryLine('  HELP          - show this help');
                addHistoryLine('  sslDM.EXE     - access admin panel (password required)');
            }
            else if (command === 'cls') {
                while (historyContainer.firstChild) historyContainer.removeChild(historyContainer.firstChild);
                addHistoryLine('╔══════════════════════════════════════════════════════════╗');
                addHistoryLine('║                         SSL                              ║');
                addHistoryLine('║         ROBCO INDUSTRIES (TM) TERMINAL v.INF             ║');
                addHistoryLine('╚══════════════════════════════════════════════════════════╝');
                addHistoryLine('');
            }
            else if (command === 'ver') {
                addHistoryLine('SSL // INFINITE CORE');
                addHistoryLine('ROBCO INDUSTRIES (TM) // ACTIVE SINCE 2049-08-04');
            }
            else if (command === 'ssldm.exe' || command === 'ssldm') {
                promptAdminPassword();
            }
            else {
                addHistoryLine(`Bad command or file name: ${trimmed}`);
            }
        }

        function checkAdminPassword(pass) {
            if (pass === '33419') {
                adminMode = true;
                promptSpan.innerText = `ADMIN>`;
                addHistoryLine('Access granted. You are now in ADMIN mode.', false);
                addHistoryLine('Type "help" for admin commands, "exit" to leave admin mode.', false);
                onlineUsers.clear();
                onlineUsers.add(clientId);
                requestFullUserList();
                setTimeout(() => {
                    addHistoryLine(`[ADMIN] Current users online: ${Array.from(onlineUsers).join(', ') || 'none'}`, false);
                }, 500);
            } else {
                addHistoryLine('Access denied. Invalid password.', false);
            }
            pendingFileId = null;
            cmdInput.dataset.mode = "normal";
        }

        // ========== ИСТОРИЯ КОМАНД ==========
        let commandHistory = [];
        let historyIndex = -1;

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                if (commandHistory.length === 0) return;
                if (historyIndex === -1) historyIndex = commandHistory.length - 1;
                else if (historyIndex > 0) historyIndex--;
                cmdInput.value = commandHistory[historyIndex];
                e.preventDefault();
            }
            else if (e.key === 'ArrowDown') {
                if (commandHistory.length === 0) return;
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    cmdInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    cmdInput.value = "";
                }
                e.preventDefault();
            }
            else if (e.key === 'Enter') {
                const value = cmdInput.value.trim();
                if (value !== "") {
                    commandHistory.push(value);
                }
                historyIndex = -1;

                if (cmdInput.dataset.mode === "password") {
                    checkPassword(value);
                    cmdInput.dataset.mode = "normal";
                }
                else if (cmdInput.dataset.mode === "admin_password") {
                    checkAdminPassword(value);
                }
                else {
                    processCommand(value);
                }
                cmdInput.value = "";
                e.preventDefault();
            }
        });

        document.querySelector('.terminal').addEventListener('click', () => {
            cmdInput.focus();
        });

        window.addEventListener('beforeunload', () => {
            announceRemoveUser();
        });

        const convexDiv = document.getElementById('crtConvex');
        let breathDirection = 1;
        let breathValue = 0;
        setInterval(() => {
            breathValue += 0.02 * breathDirection;
            if (breathValue > 1.2) breathDirection = -1;
            if (breathValue < -0.2) breathDirection = 1;
            const rotateY = 0.5 + breathValue * 0.15;
            const rotateX = 2 + breathValue * 0.3;
            convexDiv.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }, 180);
    </script>
</body>
</html>
