<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SSL // SERVER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: url('https://i.ibb.co/WNRqtkN3/image-9.png') 0 0, auto;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', 'Fira Code', 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: crtFlicker 0.08s infinite;
        }

        @keyframes crtFlicker {
            0% { opacity: 0.97; }
            100% { opacity: 1; }
        }

        .crt-convex {
            position: relative;
            width: 100%;
            height: 100%;
            background: #030a03;
            border-radius: 60px / 40px;
            overflow: hidden;
            box-shadow: 
                inset 0 0 80px rgba(0, 20, 0, 0.9),
                0 0 0 6px #1a3a1a,
                0 0 0 12px #0a1f0a;
            transform: perspective(1200px) rotateX(2deg) rotateY(0.5deg);
            transition: transform 0.1s ease;
        }

        .crt-convex::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0, 255, 0, 0.05) 0%, rgba(0, 0, 0, 0.4) 80%);
            pointer-events: none;
            z-index: 3;
            border-radius: inherit;
        }

        .crt-convex::after {
            content: "";
            position: absolute;
            top: 5%;
            left: 10%;
            width: 80%;
            height: 30%;
            background: radial-gradient(ellipse, rgba(100, 255, 100, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 4;
            border-radius: 50%;
            filter: blur(8px);
        }

        .terminal {
            width: 100%;
            height: 100%;
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            color: #3eff7e;
            position: relative;
            z-index: 2;
            overflow-y: auto;
            background: #020a02;
            background-image: radial-gradient(rgba(0, 40, 0, 0.3) 1px, transparent 1px);
            background-size: 4px 4px;
            text-shadow: 0 0 3px #00aa33;
            border-radius: inherit;
        }

        .boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #010a01;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            color: #2eff7a;
            transition: opacity 0.3s ease;
        }

        .boot-screen.hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        .boot-version {
            font-size: 2rem;
            letter-spacing: 4px;
            white-space: nowrap;
            overflow-x: hidden;
            max-width: 98vw;
            padding: 0 1rem;
        }

        .boot-spinner {
            font-size: 2.5rem;
            margin-top: 1rem;
        }

        .version-scroll {
            overflow-x: hidden;
            white-space: nowrap;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid #2e8b57;
            padding-bottom: 0.3rem;
        }

        .system-version {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            display: inline-block;
            font-family: monospace;
        }

        .dos-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .command-history {
            flex: 1;
            background: #020802aa;
            border-radius: 12px;
            padding: 0.8rem;
            margin: 0.8rem 0;
            overflow-y: auto;
            font-size: 0.9rem;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .history-line {
            margin: 0.1rem 0;
            line-height: 1.3;
        }

        .command-line {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #041104cc;
            padding: 0.5rem 0.8rem;
            border-radius: 16px;
            margin-top: 0.2rem;
        }

        .prompt {
            font-size: 1rem;
            font-weight: bold;
            color: #b0ffb0;
        }

        #cmdInput {
            background: transparent;
            border: none;
            color: #3eff7e;
            font-family: monospace;
            font-size: 0.95rem;
            flex: 1;
            outline: none;
            caret-color: #5eff8f;
        }

        .effect-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }

        #noiseCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.25;
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 10001;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 30, 0, 0.5) 0px, rgba(0, 255, 0, 0.08) 2px, transparent 3px, transparent 7px);
            pointer-events: none;
            z-index: 10002;
            animation: scanMove 0.15s linear infinite;
        }

        @keyframes scanMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 8px; }
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0a2a0a;
            border-left: 4px solid #3eff7e;
            padding: 10px 15px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #3eff7e;
            z-index: 20000;
            max-width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: fadeOut 5s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(0); }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; transform: translateX(20px); }
        }

        #mdEditor {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #020a02;
            border-radius: 12px;
            margin: 0.8rem 0;
            overflow: hidden;
        }
        #mdInput {
            flex: 1;
            background: #000;
            color: #3eff7e;
            border: none;
            padding: 10px;
            font-family: monospace;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            border-bottom: 1px solid #2e8b57;
        }
        #mdPreview {
            flex: 1;
            background: #020802;
            color: #9eff9e;
            padding: 10px;
            overflow: auto;
            font-family: monospace;
            font-size: 0.9rem;
        }
        #mdPreview h1, #mdPreview h2, #mdPreview h3 {
            color: #b0ffb0;
            margin: 0.5rem 0;
        }
        #mdPreview code {
            background: #0a2a0a;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .editor-toolbar {
            background: #041104;
            padding: 5px 10px;
            border-bottom: 1px solid #2e8b57;
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            justify-content: space-between;
        }
        .editor-toolbar span {
            color: #8eff8e;
        }
        .save-btn {
            background: #0a2a0a;
            border: 1px solid #3eff7e;
            color: #3eff7e;
            font-family: monospace;
            padding: 2px 8px;
            border-radius: 12px;
            cursor: pointer;
        }
        .save-btn:hover {
            background: #1a4a1a;
        }
    </style>
</head>
<body>

    <canvas id="noiseCanvas" class="effect-layer"></canvas>
    <div class="scanlines"></div>

    <div id="bootScreen" class="boot-screen">
        <div class="boot-version">SSL v.INF</div>
        <div class="boot-spinner" id="bootSpinner">/</div>
        <div style="margin-top: 2rem;">[ ACTIVATING SECURE LAYER ]</div>
    </div>

    <div class="crt-convex" id="crtConvex">
        <div class="terminal">
            <div class="version-scroll">
                <div class="system-version">SSL // SERVER</div>
            </div>

            <div id="dosScreen" class="dos-screen">
                <div class="command-history" id="historyContainer"></div>
                <div class="command-line">
                    <span class="prompt" id="currentPrompt">A&gt;</span>
                    <input type="text" id="cmdInput" autofocus spellcheck="false" autocomplete="off">
                </div>
            </div>

            <div id="mdEditor">
                <div class="editor-toolbar">
                    <span>📝 EDITOR: <span id="mdFileName">untitled.md</span></span>
                    <div>
                        <button class="save-btn" id="saveBtn">💾 SAVE</button>
                        <span style="margin-left: 8px;">🔚 ESC</span>
                    </div>
                </div>
                <textarea id="mdInput" placeholder="Write Markdown here..."></textarea>
                <div id="mdPreview"></div>
            </div>
        </div>
    </div>

    <script>
        // ================== ПРИНУДИТЕЛЬНАЯ УСТАНОВКА ТОКЕНА И GIST ID ==================
        if (!localStorage.getItem('gist_token')) {
            localStorage.setItem('gist_token', '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');
        }
        if (!localStorage.getItem('gist_id')) {
            localStorage.setItem('gist_id', '03360f2ddda0253c68766cea35107a82');
        }

        // ================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==================
        const channel = new BroadcastChannel('ssl_admin_channel');
        const clientId = 'id_' + Math.random().toString(36).substring(2, 10) + '_' + Date.now();
        let adminMode = false;
        let onlineUsers = new Set();

        let gistToken = localStorage.getItem('gist_token');
        let gistId = localStorage.getItem('gist_id');
        let gistFiles = {};

        const systemFiles = {
            "001": { name: "INFO.txt", content: "=== SYSTEM INFORMATION ===\nSSL // ROBCO INDUSTRIES (TM)\nMILITECH MK31 DEFENDER\nACTIVE SINCE 2049-08-04\nINFINITE CORE ONLINE", protected: false, password: null },
            "002": { name: "STASON.dat", content: "=== STASON DATA ===\n[CONFIDENTIAL]\nACCESS GRANTED\nSECURITY LEVEL: ALPHA\nSYSTEM OVERRIDE CODE: X7-990-0A1", protected: true, password: "3350" },
            "003": { name: "sslDM.EXE", content: "ADMIN TOOL", protected: false, password: null, isAdminTool: true }
        };

        // ================== GIST FUNCTIONS ==================
        async function loadGistFiles() {
            if (!gistToken || !gistId) return {};
            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                    headers: { 'Authorization': `token ${gistToken}` }
                });
                if (!res.ok) throw new Error(`Gist load error: ${res.status}`);
                const data = await res.json();
                const files = {};
                for (const [filename, fileData] of Object.entries(data.files)) {
                    files[filename] = fileData.content || '';
                }
                gistFiles = files;
                return files;
            } catch(e) {
                console.warn(e);
                return {};
            }
        }

        async function saveGistFiles(files) {
            if (!gistToken || !gistId) throw new Error('Gist not configured');
            const payload = { files: {} };
            for (const [name, content] of Object.entries(files)) {
                payload.files[name] = { content };
            }
            const res = await fetch(`https://api.github.com/gists/${gistId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${gistToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error(`Save error: ${res.status}`);
            gistFiles = files;
            return await res.json();
        }

        // ================== UTILS ==================
        function getCurrentDate() {
            const now = new Date();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            const year = now.getFullYear().toString().slice(-2);
            return `${month}-${day}-${year}`;
        }

        function getCurrentTime() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        function showNotification(message, color = '#3eff7e') {
            const div = document.createElement('div');
            div.className = 'notification';
            div.style.borderLeftColor = color;
            div.style.color = color;
            div.innerText = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        // ================== USER SYNC (ADMIN) ==================
        function announceNewUser() {
            onlineUsers.add(clientId);
            channel.postMessage({ type: 'new_client', id: clientId });
        }
        function announceRemoveUser() {
            onlineUsers.delete(clientId);
            channel.postMessage({ type: 'remove_client', id: clientId });
        }
        function requestFullUserList() {
            channel.postMessage({ type: 'request_full_list', from: clientId });
        }

        channel.onmessage = (e) => {
            const data = e.data;
            if (!data) return;
            if (data.type === 'new_client') {
                onlineUsers.add(data.id);
                if (adminMode) addHistoryLine(`[ADMIN] New user connected: ${data.id}`, false);
            }
            else if (data.type === 'remove_client') {
                onlineUsers.delete(data.id);
                if (adminMode) addHistoryLine(`[ADMIN] User disconnected: ${data.id}`, false);
            }
            else if (data.type === 'request_full_list') {
                channel.postMessage({ type: 'client_present', id: clientId, target: data.from });
            }
            else if (data.type === 'client_present') {
                if (adminMode && data.target === clientId) onlineUsers.add(data.id);
            }
            else if (data.type === 'broadcast') {
                if (data.from !== clientId) {
                    showNotification(`📢 MESSAGE FROM ADMIN: ${data.message}`, data.color || '#3eff7e');
                    addHistoryLine(`[SERVER] Admin broadcast: ${data.message}`, false);
                }
            }
            else if (data.type === 'direct') {
                if (data.targetId === clientId) {
                    showNotification(`✉️ PRIVATE from ${data.from}: ${data.message}`, data.color || '#3eff7e');
                    addHistoryLine(`[PRIVATE] ${data.from}: ${data.message}`, false);
                }
            }
            else if (data.type === 'kick') {
                if (data.targetId === clientId) {
                    showNotification('⚠️ You have been kicked by administrator!', '#ff5555');
                    addHistoryLine('[SYSTEM] You were kicked. Reloading...', false);
                    setTimeout(() => {
                        document.body.innerHTML = '<div style="color:#3eff7e; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; font-family:monospace; flex-direction:column;">SESSION TERMINATED<br><span style="font-size:0.8rem;">Reload page to reconnect.</span></div>';
                    }, 500);
                }
            }
        };

        // ================== BOOT ==================
        const bootScreen = document.getElementById('bootScreen');
        const dosScreen = document.getElementById('dosScreen');
        const bootSpinner = document.getElementById('bootSpinner');
        let spinIdx = 0;
        const spinnerChars = ["l", "/", "-", "\\"];
        const spinnerInterval = setInterval(() => {
            spinIdx = (spinIdx + 1) % spinnerChars.length;
            if (bootSpinner) bootSpinner.innerText = spinnerChars[spinIdx];
        }, 150);

        setTimeout(async () => {
            clearInterval(spinnerInterval);
            bootScreen.classList.add('hidden');
            await loadGistFiles();
            initHistory();
            document.getElementById('cmdInput').focus();
            announceNewUser();
        }, 4000);

        // ================== NOISE ==================
        const noiseCanvas = document.getElementById('noiseCanvas');
        let noiseCtx = noiseCanvas.getContext('2d');
        let noiseActive = true;
        function resizeNoise() {
            noiseCanvas.width = window.innerWidth;
            noiseCanvas.height = window.innerHeight;
        }
        function generateNoise() {
            if (!noiseActive) {
                if (noiseCtx) noiseCtx.clearRect(0, 0, noiseCanvas.width, noiseCanvas.height);
                requestAnimationFrame(generateNoise);
                return;
            }
            const w = noiseCanvas.width, h = noiseCanvas.height;
            const imgData = noiseCtx.createImageData(w, h);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const val = Math.random() * 80 + 30;
                imgData.data[i] = val - 20;
                imgData.data[i+1] = val + 40;
                imgData.data[i+2] = val - 30;
                imgData.data[i+3] = 90 + Math.random() * 70;
            }
            noiseCtx.putImageData(imgData, 0, 0);
            requestAnimationFrame(generateNoise);
        }
        window.addEventListener('resize', () => resizeNoise());
        resizeNoise();
        generateNoise();

        // ================== HISTORY & UI ==================
        const historyContainer = document.getElementById('historyContainer');
        const cmdInput = document.getElementById('cmdInput');
        const promptSpan = document.getElementById('currentPrompt');
        let currentPath = 'A';
        let pendingFileId = null;

        function addHistoryLine(text, isCommand = false) {
            const line = document.createElement('div');
            line.className = 'history-line';
            line.style.color = isCommand ? '#b0ffb0' : '#9eff9e';
            line.innerText = text;
            historyContainer.appendChild(line);
            historyContainer.scrollTop = historyContainer.scrollHeight;
        }

        function initHistory() {
            addHistoryLine('╔══════════════════════════════════════════════════════════╗');
            addHistoryLine('║                   SSL // SERVER                          ║');
            addHistoryLine('║         ROBCO INDUSTRIES (TM) TERMINAL v.INF             ║');
            addHistoryLine('╚══════════════════════════════════════════════════════════╝');
            addHistoryLine('');
            addHistoryLine(`Enter today's date (m-d-y): ${getCurrentDate()}`);
            addHistoryLine('');
        }

        // ================== SYSTEM FILE OPEN ==================
        function displaySystemFile(id) {
            const file = systemFiles[id];
            if (!file) return false;
            if (file.isAdminTool) {
                promptAdminPassword();
                return true;
            }
            if (file.protected) {
                addHistoryLine(`File "${file.name}" is password protected. Enter password:`);
                pendingFileId = id;
                cmdInput.dataset.mode = "password";
                cmdInput.value = "";
                cmdInput.focus();
                return true;
            }
            addHistoryLine(`=== ${file.name} (ID: ${id}) ===`);
            file.content.split('\n').forEach(line => addHistoryLine(line));
            addHistoryLine('');
            return true;
        }

        function promptAdminPassword() {
            addHistoryLine('Enter admin password:');
            pendingFileId = 'admin_auth';
            cmdInput.dataset.mode = "admin_password";
            cmdInput.value = "";
            cmdInput.focus();
        }

        function checkPassword(inputPass) {
            if (!pendingFileId) return;
            if (pendingFileId === 'admin_auth') {
                checkAdminPassword(inputPass);
                return;
            }
            const file = systemFiles[pendingFileId];
            if (inputPass === file.password) {
                addHistoryLine(`Access granted. Opening ${file.name}:`);
                addHistoryLine(`=== ${file.name} (ID: ${pendingFileId}) ===`);
                file.content.split('\n').forEach(line => addHistoryLine(line));
                addHistoryLine('');
            } else {
                addHistoryLine(`Access denied. Incorrect password for ${file.name}.`);
            }
            pendingFileId = null;
            cmdInput.dataset.mode = "normal";
        }

        function checkAdminPassword(pass) {
            if (pass === '33419') {
                adminMode = true;
                promptSpan.innerText = `ADMIN>`;
                addHistoryLine('Access granted. You are now in ADMIN mode.', false);
                addHistoryLine('Type "help" for admin commands, "exit" to leave admin mode.', false);
                onlineUsers.clear();
                onlineUsers.add(clientId);
                requestFullUserList();
                setTimeout(() => {
                    addHistoryLine(`[ADMIN] Current users online: ${Array.from(onlineUsers).join(', ') || 'none'}`, false);
                }, 500);
            } else {
                addHistoryLine('Access denied. Invalid password.', false);
            }
            pendingFileId = null;
            cmdInput.dataset.mode = "normal";
        }

        // ================== ADMIN COMMANDS ==================
        function adminHelp() {
            addHistoryLine('Admin commands:');
            addHistoryLine('  send_all <color> <msg>   - broadcast');
            addHistoryLine('  send_user <ID> <msg>     - private');
            addHistoryLine('  list                     - show users');
            addHistoryLine('  kick <ID>                - kick user');
            addHistoryLine('  LS                       - list cloud files');
            addHistoryLine('  CAT <file>               - view cloud file');
            addHistoryLine('  NEW <file>               - create cloud file (multiline, end with .)');
            addHistoryLine('  EDIT <file>              - edit cloud file');
            addHistoryLine('  RM <file>                - delete cloud file');
            addHistoryLine('  DATE                     - show system date');
            addHistoryLine('  TIME                     - show system time');
            addHistoryLine('  exit                     - exit admin mode');
        }

        async function adminListGist() {
            await loadGistFiles();
            if (Object.keys(gistFiles).length === 0) addHistoryLine('No files in gist.');
            else {
                addHistoryLine('Cloud files:');
                for (const name of Object.keys(gistFiles)) addHistoryLine(`  ${name}`);
            }
        }

        async function adminCatGist(filename) {
            await loadGistFiles();
            const content = gistFiles[filename];
            if (content === undefined) { addHistoryLine(`File "${filename}" not found.`); return; }
            addHistoryLine(`=== ${filename} ===`);
            content.split('\n').forEach(line => addHistoryLine(line));
            addHistoryLine('');
        }

        async function adminNewGist(filename) {
            if (!filename) { addHistoryLine('Usage: NEW <filename>'); return; }
            addHistoryLine(`Enter content for ${filename} (end with a line containing only '.'):`);
            pendingFileId = { type: 'admin_new', filename };
            cmdInput.dataset.mode = "multiline";
            cmdInput.value = "";
            cmdInput.focus();
            window._multilineCallback = async (content) => {
                gistFiles[filename] = content;
                await saveGistFiles(gistFiles);
                addHistoryLine(`File ${filename} created.`);
                pendingFileId = null;
                delete window._multilineCallback;
            };
        }

        async function adminEditGist(filename) {
            if (!filename) { addHistoryLine('Usage: EDIT <filename>'); return; }
            await loadGistFiles();
            const oldContent = gistFiles[filename];
            if (oldContent === undefined) { addHistoryLine(`File "${filename}" not found.`); return; }
            addHistoryLine(`Editing ${filename}. Enter new content (end with '.'):`);
            pendingFileId = { type: 'admin_edit', filename };
            cmdInput.dataset.mode = "multiline";
            cmdInput.value = "";
            cmdInput.focus();
            window._multilineCallback = async (content) => {
                gistFiles[filename] = content;
                await saveGistFiles(gistFiles);
                addHistoryLine(`File ${filename} updated.`);
                pendingFileId = null;
                delete window._multilineCallback;
            };
        }

        async function adminRmGist(filename) {
            if (!filename) { addHistoryLine('Usage: RM <filename>'); return; }
            await loadGistFiles();
            if (!gistFiles[filename]) { addHistoryLine(`File not found.`); return; }
            delete gistFiles[filename];
            await saveGistFiles(gistFiles);
            addHistoryLine(`File ${filename} deleted.`);
        }

        function processAdminCommand(cmd) {
            const parts = cmd.trim().split(/\s+/);
            const command = parts[0].toLowerCase();
            if (command === 'exit') {
                adminMode = false;
                promptSpan.innerText = `${currentPath}>`;
                addHistoryLine('Exited admin mode.', false);
                return;
            }
            else if (command === 'help') adminHelp();
            else if (command === 'list') {
                if (onlineUsers.size === 0) addHistoryLine('No users online.', false);
                else addHistoryLine(`Online users (${onlineUsers.size}): ${Array.from(onlineUsers).join(', ')}`, false);
            }
            else if (command === 'send_all') {
                if (parts.length < 3) { addHistoryLine('Usage: send_all <color> <message>', false); return; }
                const colorMap = { red: '#ff5555', green: '#55ff55', blue: '#5555ff', yellow: '#ffff55', magenta: '#ff55ff', cyan: '#55ffff' };
                let color = parts[1].toLowerCase();
                if (!colorMap[color]) { addHistoryLine('Invalid color.', false); return; }
                const message = parts.slice(2).join(' ');
                channel.postMessage({ type: 'broadcast', message, color: colorMap[color], from: clientId });
                addHistoryLine(`[ADMIN] Broadcast sent to all (${color}): ${message}`, false);
            }
            else if (command === 'send_user') {
                if (parts.length < 3) { addHistoryLine('Usage: send_user <ID> <message>', false); return; }
                const targetId = parts[1];
                const message = parts.slice(2).join(' ');
                channel.postMessage({ type: 'direct', targetId, message, color: '#ffaa55', from: clientId });
                addHistoryLine(`[ADMIN] Private message sent to ${targetId}: ${message}`, false);
            }
            else if (command === 'kick') {
                if (parts.length < 2) { addHistoryLine('Usage: kick <ID>', false); return; }
                const targetId = parts[1];
                if (targetId === clientId) { addHistoryLine('[ADMIN] You cannot kick yourself.', false); return; }
                channel.postMessage({ type: 'kick', targetId, from: clientId });
                addHistoryLine(`[ADMIN] Kicked user ${targetId}`, false);
                onlineUsers.delete(targetId);
            }
            else if (command === 'ls') {
                adminListGist();
            }
            else if (command === 'cat') {
                if (parts.length < 2) addHistoryLine('Usage: CAT <filename>');
                else adminCatGist(parts[1]);
            }
            else if (command === 'new') {
                if (parts.length < 2) addHistoryLine('Usage: NEW <filename>');
                else adminNewGist(parts[1]);
            }
            else if (command === 'edit') {
                if (parts.length < 2) addHistoryLine('Usage: EDIT <filename>');
                else adminEditGist(parts[1]);
            }
            else if (command === 'rm') {
                if (parts.length < 2) addHistoryLine('Usage: RM <filename>');
                else adminRmGist(parts[1]);
            }
            else if (command === 'date') {
                addHistoryLine(`Current date is ${getCurrentDate()}`);
            }
            else if (command === 'time') {
                addHistoryLine(`Current time is ${getCurrentTime()}`);
            }
            else addHistoryLine(`Unknown admin command: ${command}. Type 'help' for list.`, false);
        }

        // ================== MARKDOWN EDITOR ==================
        const mdEditor = document.getElementById('mdEditor');
        const mdInputArea = document.getElementById('mdInput');
        const mdPreview = document.getElementById('mdPreview');
        const mdFileNameSpan = document.getElementById('mdFileName');
        const saveBtn = document.getElementById('saveBtn');
        let currentMDFile = null;

        function renderMarkdown(text) {
            return text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*?)\*\*/gim, '<b>$1</b>')
                .replace(/\*(.*?)\*/gim, '<i>$1</i>')
                .replace(/`(.*?)`/gim, '<code>$1</code>')
                .replace(/\n/gim, '<br>');
        }

        mdInputArea.addEventListener('input', () => {
            mdPreview.innerHTML = renderMarkdown(mdInputArea.value);
        });

        async function openMDEditor(filename, content = '') {
            dosScreen.style.display = 'none';
            mdEditor.style.display = 'flex';
            currentMDFile = filename;
            mdFileNameSpan.innerText = filename;
            mdInputArea.value = content;
            mdPreview.innerHTML = renderMarkdown(content);
            mdInputArea.focus();
        }

        function closeMDEditor() {
            mdEditor.style.display = 'none';
            dosScreen.style.display = 'flex';
            cmdInput.focus();
        }

        async function saveMDFile() {
            if (!currentMDFile) return;
            gistFiles[currentMDFile] = mdInputArea.value;
            try {
                await saveGistFiles(gistFiles);
                showNotification(`Saved: ${currentMDFile}`);
            } catch(e) {
                showNotification(`Error: ${e.message}`, '#ff5555');
            }
        }

        saveBtn.addEventListener('click', () => {
            saveMDFile();
        });

        // ================== USER COMMANDS (DIR NEW / DIR EDIT) ==================
        async function userNewFile() {
            addHistoryLine('Enter new filename (must end with .md):');
            pendingFileId = { type: 'user_new_filename' };
            cmdInput.dataset.mode = "new_filename";
            cmdInput.value = "";
            cmdInput.focus();
        }

        async function userEditFile(filename) {
            if (!filename) {
                addHistoryLine('Usage: DIR EDIT <filename.md>');
                return;
            }
            await loadGistFiles();
            const content = gistFiles[filename];
            if (!content) {
                addHistoryLine(`File "${filename}" not found.`);
                return;
            }
            openMDEditor(filename, content);
        }

        // ================== MAIN COMMAND PROCESSOR ==================
        async function processCommand(cmd) {
            const trimmed = cmd.trim();
            if (trimmed === '') return;

            if (adminMode) {
                addHistoryLine(`ADMIN>${trimmed}`, true);
                processAdminCommand(trimmed);
                return;
            }

            addHistoryLine(`${currentPath}>${trimmed}`, true);
            const parts = trimmed.split(/\s+/);
            const command = parts[0].toLowerCase();

            if (command === 'dir') {
                if (parts.length === 1) {
                    addHistoryLine(' Volume in drive A is SSL_VOL');
                    addHistoryLine(' Volume Serial Number is 2E47-1901');
                    addHistoryLine('');
                    addHistoryLine('NAME            TYPE        SIZE');
                    addHistoryLine('--------------- ----------- --------');
                    for (const [id, file] of Object.entries(systemFiles)) {
                        const size = file.content.length.toString().padStart(6, ' ');
                        addHistoryLine(`${id.padEnd(15)} SYS         ${size}b`);
                    }
                    if (gistToken && gistId) {
                        await loadGistFiles();
                        for (const [name, content] of Object.entries(gistFiles)) {
                            const size = (content?.length || 0).toString().padStart(6, ' ');
                            const type = name.endsWith('.md') ? 'MARKDOWN' : 'CLOUD';
                            addHistoryLine(`${name.padEnd(15)} ${type.padEnd(11)} ${size}b`);
                        }
                    }
                    addHistoryLine('');
                } else {
                    const sub = parts[1].toLowerCase();
                    if (sub === 'new') {
                        await userNewFile();
                        return;
                    } else if (sub === 'edit') {
                        if (parts.length < 3) {
                            addHistoryLine('Usage: DIR EDIT <filename.md>');
                        } else {
                            await userEditFile(parts[2]);
                        }
                        return;
                    } else {
                        // открыть файл по имени
                        const target = parts[1];
                        if (/^\d{3}$/.test(target)) {
                            displaySystemFile(target);
                            return;
                        }
                        if (gistFiles[target] !== undefined) {
                            const content = gistFiles[target];
                            addHistoryLine(`=== ${target} ===`);
                            if (target.endsWith('.md')) {
                                content.split('\n').forEach(line => addHistoryLine(line));
                            } else {
                                content.split('\n').forEach(line => addHistoryLine(line));
                            }
                            addHistoryLine('');
                            return;
                        }
                        addHistoryLine(`File not found: ${target}`);
                    }
                }
            }
            else if (command === 'help') {
                addHistoryLine('Available commands:');
                addHistoryLine('  DIR                     - list system + cloud files');
                addHistoryLine('  DIR <ID|filename>       - open file');
                addHistoryLine('  DIR NEW                 - create new Markdown file');
                addHistoryLine('  DIR EDIT <filename.md>  - edit Markdown file');
                addHistoryLine('  CLS                     - clear screen');
                addHistoryLine('  VER                     - show version');
                addHistoryLine('  HELP                    - this help');
                addHistoryLine('  sslDM.EXE               - admin panel');
            }
            else if (command === 'cls') {
                while (historyContainer.firstChild) historyContainer.removeChild(historyContainer.firstChild);
                addHistoryLine('╔══════════════════════════════════════════════════════════╗');
                addHistoryLine('║                   SSL // SERVER                          ║');
                addHistoryLine('║         ROBCO INDUSTRIES (TM) TERMINAL v.INF             ║');
                addHistoryLine('╚══════════════════════════════════════════════════════════╝');
                addHistoryLine('');
            }
            else if (command === 'ver') {
                addHistoryLine('SSL // SERVER');
                addHistoryLine('GitHub Gist integration active');
            }
            else if (command === 'ssldm.exe' || command === 'ssldm') {
                promptAdminPassword();
            }
            else {
                addHistoryLine(`Bad command or file name: ${trimmed}`);
            }
        }

        // ================== COMMAND HISTORY & MULTILINE ==================
        let commandHistory = [];
        let historyIndex = -1;
        let multilineBuffer = [];

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                if (commandHistory.length === 0) return;
                if (historyIndex === -1) historyIndex = commandHistory.length - 1;
                else if (historyIndex > 0) historyIndex--;
                cmdInput.value = commandHistory[historyIndex];
                e.preventDefault();
            }
            else if (e.key === 'ArrowDown') {
                if (commandHistory.length === 0) return;
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    cmdInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    cmdInput.value = "";
                }
                e.preventDefault();
            }
            else if (e.key === 'Enter') {
                const value = cmdInput.value;
                if (cmdInput.dataset.mode === "multiline") {
                    if (value === '.') {
                        const content = multilineBuffer.join('\n');
                        if (window._multilineCallback) window._multilineCallback(content);
                        cmdInput.dataset.mode = "normal";
                        multilineBuffer = [];
                        cmdInput.value = "";
                    } else {
                        multilineBuffer.push(value);
                        cmdInput.value = "";
                    }
                    e.preventDefault();
                    return;
                }
                else if (cmdInput.dataset.mode === "new_filename") {
                    if (value && value.endsWith('.md')) {
                        cmdInput.dataset.mode = "normal";
                        addHistoryLine(`Creating new file: ${value}`);
                        openMDEditor(value, '# New File\n\nWrite your content here.');
                    } else {
                        addHistoryLine('Invalid filename. Must end with .md');
                        cmdInput.dataset.mode = "normal";
                    }
                    cmdInput.value = "";
                    e.preventDefault();
                    return;
                }

                if (value.trim() !== "") commandHistory.push(value.trim());
                historyIndex = -1;

                if (cmdInput.dataset.mode === "password") {
                    checkPassword(value);
                    cmdInput.dataset.mode = "normal";
                }
                else if (cmdInput.dataset.mode === "admin_password") {
                    checkAdminPassword(value);
                }
                else {
                    processCommand(value);
                }
                cmdInput.value = "";
                e.preventDefault();
            }
        });

        mdInputArea.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveMDFile();
            }
            if (e.key === 'Escape') {
                closeMDEditor();
            }
        });

        document.querySelector('.terminal').addEventListener('click', () => {
            if (mdEditor.style.display === 'flex') mdInputArea.focus();
            else cmdInput.focus();
        });

        window.addEventListener('beforeunload', () => {
            announceRemoveUser();
        });

        const convexDiv = document.getElementById('crtConvex');
        let breathDirection = 1;
        let breathValue = 0;
        setInterval(() => {
            breathValue += 0.02 * breathDirection;
            if (breathValue > 1.2) breathDirection = -1;
            if (breathValue < -0.2) breathDirection = 1;
            const rotateY = 0.5 + breathValue * 0.15;
            const rotateX = 2 + breathValue * 0.3;
            convexDiv.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        }, 180);
    </script>
</body>
</html>
