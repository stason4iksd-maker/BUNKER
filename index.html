<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSL Terminal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;cursor:url('https://i.ibb.co/WNRqtkN3/image-9.png')0 0,auto;}
body{background:#000;font-family:Courier New,monospace;overflow:hidden}

/* CRT */
#crt{
width:100vw;height:100vh;
background:radial-gradient(circle,#030a03,#010401);
border-radius:60px/40px;
padding:20px;color:#00ff88;
text-shadow:0 0 6px #00ff88;
display:flex;flex-direction:column;
animation:breathe 3s infinite ease-in-out;
}
@keyframes breathe{
0%,100%{transform:perspective(800px)rotateX(0)rotateY(0)}
50%{transform:perspective(800px)rotateX(1deg)rotateY(-1deg)}
}

/* scanlines */
#crt:after{
content:"";position:absolute;inset:0;
background:repeating-linear-gradient(
to bottom,rgba(0,255,100,0.05)0px,
rgba(0,255,100,0.05)1px,transparent 2px);
pointer-events:none;
}

/* flicker */
#crt:before{
content:"";position:absolute;inset:0;
background:rgba(255,255,255,0.02);
animation:flicker .1s infinite;
}
@keyframes flicker{0%,100%{opacity:.02}50%{opacity:.04}}

/* noise */
canvas{position:absolute;inset:0;opacity:.08;pointer-events:none}

/* boot */
#boot{
position:absolute;inset:0;background:#000;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
color:#00ff88;font-size:18px;
}

/* terminal */
#header{white-space:nowrap;overflow:hidden}
#output{flex:1;overflow-y:auto;white-space:pre-wrap}
#input-line{display:flex}
#input{flex:1;background:transparent;border:none;color:#00ff88;outline:none;font-family:inherit}

/* notifications */
#notifications{position:absolute;bottom:20px;right:20px}
.notification{
background:#000;border-left:4px solid #00ff88;
padding:10px;margin-top:10px;
animation:fade 5s forwards;
}
@keyframes fade{
0%{opacity:1}80%{opacity:1}100%{opacity:0}
}
</style>
</head>

<body>

<div id="crt">
<canvas id="noise"></canvas>

<div id="boot">
<div>SSL расшифровка Shadow Since Laboratory v.INF</div>
<div id="spinner">|</div>
<div>[ ACTIVATING SECURE LAYER ]</div>
</div>

<div id="header">SSL расшифровка Shadow Since Laboratory // ACTIVE</div>
<div id="output"></div>

<div id="input-line">
<span id="prompt">A></span>
<input id="input" autofocus>
</div>

<div id="notifications"></div>
</div>

<script>
/* ================= NOISE ================= */
const canvas=document.getElementById('noise');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
window.onresize=resize;resize();
function noise(){
let img=ctx.createImageData(canvas.width,canvas.height);
for(let i=0;i<img.data.length;i+=4){
let v=Math.random()*255;
img.data[i]=img.data[i+1]=img.data[i+2]=v;
img.data[i+3]=20;
}
ctx.putImageData(img,0,0);
requestAnimationFrame(noise);
}
noise();

/* ================= BOOT ================= */
const boot=document.getElementById('boot');
const spinner=document.getElementById('spinner');
let chars=['|','/','-','\\'],si=0;
let spin=setInterval(()=>spinner.textContent=chars[si++%4],100);

/* ================= USERS ================= */
const channel=new BroadcastChannel('ssl_admin_channel');
const myID='id_'+Math.random().toString(36).substr(2,5);
let users={}; let admin=false;

function register(){
users[myID]=true;
channel.postMessage({type:'announce',id:myID});
}
function unregister(){channel.postMessage({type:'leave',id:myID});}

channel.onmessage=e=>{
let d=e.data;
if(!d)return;

if(d.type==='announce'){
users[d.id]=true;
if(d.id!==myID)channel.postMessage({type:'announce',id:myID});
}
if(d.type==='leave')delete users[d.id];

if(d.type==='broadcast' && d.from!==myID){
notify(d.msg,d.color);
print("[SERVER] "+d.msg);
}
if(d.type==='direct' && d.to===myID){
notify(d.msg,"cyan");
print("[PRIVATE] "+d.msg);
}
if(d.type==='kick' && d.to===myID){
document.body.innerHTML="<h1 style='color:#00ff88;text-align:center;margin-top:40vh'>SESSION TERMINATED<br>Reload page</h1>";
}
};

window.onbeforeunload=unregister;

/* ================= TERMINAL ================= */
const out=document.getElementById('output');
const input=document.getElementById('input');
const prompt=document.getElementById('prompt');

let history=[],hIndex=0;
let pending=null;

/* notify */
function notify(msg,color){
let n=document.createElement('div');
n.className='notification';
n.style.borderColor=color;
n.textContent=msg;
notifications.appendChild(n);
setTimeout(()=>n.remove(),5000);
}

/* print */
function print(t){
out.innerText+=t+"\n";
out.scrollTop=out.scrollHeight;
}

/* date/time */
function getDate(){
let d=new Date();
return `${d.getMonth()+1}-${d.getDate()}-${d.getFullYear().toString().slice(-2)}`;
}
function getTime(){return new Date().toLocaleTimeString();}

/* files */
const files={
"001":{name:"INFO.txt",content:`=== SYSTEM INFORMATION ===
SSL расшифровка Shadow Since Laboratory
ROBCO INDUSTRIES (TM)
MILITECH MK31 DEFENDER
ACTIVE SINCE 2049-08-04
INFINITE CORE ONLINE`},
"002":{name:"STASON.dat",password:"3350",content:`=== STASON DATA ===
[CONFIDENTIAL]
ACCESS GRANTED
SECURITY LEVEL: ALPHA
SYSTEM OVERRIDE CODE: X7-990-0A1`}
};

/* init */
function start(){
print("╔══════════════════════════════════════════════════════════╗");
print("║ SSL расшифровка Shadow Since Laboratory ║");
print("╚══════════════════════════════════════════════════════════╝");
print("");
print("Enter today's date: "+getDate());
}

/* commands */
function exec(cmd){

if(pending){
if(pending==="admin"){
if(cmd==="33419"){admin=true;prompt.textContent="ADMIN>";print("ACCESS GRANTED");}
else print("ACCESS DENIED");
}else{
if(cmd===files[pending].password)print(files[pending].content);
else print("ACCESS DENIED");
}
pending=null;return;
}

print(prompt.textContent+" "+cmd);

let p=cmd.split(" ");

switch(p[0].toLowerCase()){

case "dir":
if(!p[1]){
for(let id in files){
print(id+" "+files[id].name+" "+files[id].content.length+"B");
}
}else{
let f=files[p[1]];
if(!f)return print("NOT FOUND");
if(f.password){pending=p[1];print("ENTER PASSWORD");}
else print(f.content);
}
break;

case "date":print(getDate());break;
case "time":print(getTime());break;
case "cls":out.innerText="";break;
case "ver":print("TERMINAL v.INF");break;

case "help":
print(admin?"list send_all send_user kick exit":"DIR DATE TIME HELP CLS VER sslDM.EXE");
break;

case "ssldm.exe":pending="admin";print("ENTER ADMIN PASSWORD");break;

case "exit":admin=false;prompt.textContent="A>";break;

case "list":
if(admin)Object.keys(users).forEach(u=>print(u));
break;

case "send_all":
if(admin){
let color=p[1];
let msg=p.slice(2).join(" ");
channel.postMessage({type:"broadcast",msg,color,from:myID});
}
break;

case "send_user":
if(admin){
channel.postMessage({type:"direct",to:p[1],msg:p.slice(2).join(" "),from:myID});
}
break;

case "kick":
if(admin){
channel.postMessage({type:"kick",to:p[1]});
}
break;

default:print("UNKNOWN COMMAND");
}
}

/* input + history */
input.addEventListener('keydown',e=>{
if(e.key==="ArrowUp"){
if(history.length){
hIndex=Math.max(0,hIndex-1);
input.value=history[hIndex];
}
}
if(e.key==="ArrowDown"){
if(history.length){
hIndex=Math.min(history.length,hIndex+1);
input.value=history[hIndex]||"";
}
}
if(e.key==="Enter"){
let cmd=input.value.trim();
if(cmd){
history.push(cmd);
hIndex=history.length;
}
exec(cmd);
input.value="";
}
});

/* start */
setTimeout(()=>{
clearInterval(spin);
boot.style.display="none";
start();
register();
},4000);

document.getElementById('crt').onclick=()=>input.focus();

</script>
</body>
</html>
